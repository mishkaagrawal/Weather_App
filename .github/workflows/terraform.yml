name: "Terraform Infra Deployment"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: "mishka-cme-project"
  GKE_CLUSTER: "weather-gke-cluster"
  GKE_ZONE: "asia-south1"
  DEPLOYMENT_NAME: "weather-dashboard"
  REPOSITORY: "weatherapp"
  IMAGE: "weatherapp"
  WORKLOAD_IDENTITY_PROVIDER: "projects/574573355783/locations/global/workloadIdentityPools/github-pool/providers/github"
  SERVICE_ACCOUNT: "github-deployer@mishka-cme-project.iam.gserviceaccount.com"

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ./terraform   # your terraform folder

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color

      - name: Terraform Apply (only on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
