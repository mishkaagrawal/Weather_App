name: 'Build and Deploy to GKE'

on:
  push:
    branches:
      - main  # Trigger only on pushes to main branch

env:
  PROJECT_ID: "mishka-cme-project"
  GAR_LOCATION: "asia-south1"
  GKE_CLUSTER: "weather-gke-cluster"
  GKE_ZONE: "asia-south1"
  DEPLOYMENT_NAME: "weather-dashboard"
  REPOSITORY: "Weather_App"
  IMAGE: "weather-image"
  WORKLOAD_IDENTITY_PROVIDER: "projects/574573355783/locations/global/workloadIdentityPools/github-pool/providers/github"
  SERVICE_ACCOUNT: "github-deployer@mishka-cme-project.iam.gserviceaccount.com"

  
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev --quiet

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG="$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${GITHUB_SHA}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME weather-dashboard="$IMAGE_TAG"
          kubectl rollout status deployment/$DEPLOYMENT_NAME
          kubectl get svc -o wide
